<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirDrop Web - 跨平台文件传输</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📁 AirDrop Web</h1>
      <p>同一局域网下的文件传输工具</p>
    </div>
    <div class="content">
      <div id="joinArea">
        <div class="room-input">
          <input type="text" id="roomInput" placeholder="输入房间号" maxlength="6">
        </div>
        <button class="btn btn-primary" id="joinBtn">连接</button>
        <div id="qrCodeArea" class="qr-area hidden">
          <div id="qrCodeContainer" class="qr-code"></div>
          <p class="qr-tip">用手机扫码快速连接</p>
          <button class="btn btn-secondary" id="hideQrBtn">关闭二维码</button>
        </div>
      </div>
      <div id="ipInputArea" class="hidden">
        <div class="room-input">
          <input type="text" id="serverIpInput" placeholder="服务器IP地址" style="text-align:left;">
        </div>
        <button class="btn btn-primary" id="setIpBtn">确认连接</button>
      </div>
      <div id="statusArea" class="status waiting hidden"></div>
      <div id="fileArea" class="file-area">
        <div class="file-select" id="fileSelect">
          <input type="file" id="fileInput" multiple>
          <div class="file-icon">📄</div>
          <div>点击选择文件或拖拽文件到此处</div>
          <div style="font-size: 12px; color: #999; margin-top: 5px;">支持任意大小文件</div>
        </div>
        <div class="queue-area" id="queueArea">
          <div class="queue-header">
            <span class="queue-title">待发送文件</span>
            <span class="queue-count" id="queueCount">0 个文件</span>
          </div>
          <div class="queue-list" id="queueList"></div>
        </div>
        <button class="btn btn-primary" id="sendBtn" disabled>发送文件</button>
        <div class="file-list" id="sendFileList"></div>
        <div class="received-files">
          <h3 style="margin-bottom: 10px; font-size: 16px;">接收的文件</h3>
          <div id="receivedList"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
